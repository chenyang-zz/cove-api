name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------ #
  # 阶段 1: 复用 CI 的质量门禁
  # ------------------------------------------------------------------ #
  ci-gate:
    name: CI Quality Gate
    uses: ./.github/workflows/ci.yml

  # ------------------------------------------------------------------ #
  # 阶段 2: 构建镜像并通过 tarball artifact 传递
  # ------------------------------------------------------------------ #
  build-and-push:
    name: Build Image
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            -t cove-api:${{ steps.meta.outputs.version }} \
            .

      - name: Save image as tarball
        run: docker save cove-api:${{ steps.meta.outputs.version }} | gzip > /tmp/cove-api.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/cove-api.tar.gz
          retention-days: 1

  # ------------------------------------------------------------------ #
  # 阶段 3: SCP 传输镜像到服务器并部署
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: SCP image to server
        uses: appleboy/scp-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "cove-api.tar.gz"
          target: "/tmp/cove-api.tar.gz"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "🚀 开始部署镜像: cove-api:${{ needs.build-and-push.outputs.image-tag }}"

            # 加载镜像并 tag 为 compose 引用的本地名
            docker load -i /tmp/cove-api.tar.gz
            docker tag cove-api:${{ needs.build-and-push.outputs.image-tag }} cove-api:latest

            # 滚动更新 api 容器
            cd ${{ secrets.DEPLOY_COMPOSE_DIR || '/opt/cove' }}
            docker compose -f deployments/docker-compose.yml up -d --no-deps api

            # 清理临时文件和悬空镜像
            rm -f /tmp/cove-api.tar.gz
            docker image prune -f

            echo "✅ 部署完成"
            docker compose -f deployments/docker-compose.yml ps api

name: Cove CD

# 仅在推送语义化版本 tag 时进入 CD；生产发版由人工/流程打 tag 驱动，而非 main 每次 push。
# 发版规则：vX.Y.Z 必须指向已合入 main 的提交（先 merge 到 main，再打 tag 推送）。
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# 部署中的工作流不能被后续推送取消，避免远程替换停留在中间状态。
concurrency:
  group: cove-production-workflow
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
  ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
  # 部署仍使用不可变 commit SHA；版本号来自 tag，用于镜像附加标签与 Release。
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 发版 tag 必须落在 main 历史上；未合入 main 的 tag 直接失败，避免误发生产。
  release-guard:
    name: Release Guard (tag on main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require version tag commit is already on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported tag format: $tag (expect vX.Y.Z)"
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git rev-parse --verify -q origin/main >/dev/null; then
            echo "::error::origin/main is missing; cannot validate release tag $tag"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag $tag points to $GITHUB_SHA, which is not on main."
            echo "Rule: merge into main first, then create and push the vX.Y.Z tag from that commit."
            echo "main tip: $(git rev-parse origin/main)"
            exit 1
          fi

          echo "OK: $tag ($GITHUB_SHA) is an ancestor of origin/main ($(git rev-parse --short origin/main))."

      - name: Skip tag-on-main check for manual dispatch
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Manual dispatch without version tag; release-guard passes."

  # 只有质量门禁通过的提交才允许发布生产镜像。
  ci-gate:
    name: CI Quality Gate
    needs: release-guard
    uses: ./.github/workflows/ci.yml

  prepare-version:
    name: Resolve Release Version
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      has_release: ${{ steps.version.outputs.has_release }}
      version: ${{ steps.version.outputs.version }}
      minor: ${{ steps.version.outputs.minor }}
      major: ${{ steps.version.outputs.major }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # tag 推送：直接解析 refs/tags/vX.Y.Z
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Unsupported tag format: $tag (expect vX.Y.Z)"
              exit 1
            fi
            version="${tag#v}"
            IFS=. read -r major minor patch <<< "$version"
            printf 'has_release=true\n' >> "$GITHUB_OUTPUT"
            printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
            printf 'minor=%s.%s\n' "$major" "$minor" >> "$GITHUB_OUTPUT"
            printf 'major=%s\n' "$major" >> "$GITHUB_OUTPUT"
            echo "Release from tag $tag -> version=$version"
            exit 0
          fi

          # workflow_dispatch：无 tag，仅构建并按 SHA 部署，不发版号镜像标签。
          echo "Manual dispatch without tag; deploy by SHA only."
          printf 'has_release=false\n' >> "$GITHUB_OUTPUT"
          printf 'tag=\n' >> "$GITHUB_OUTPUT"
          printf 'version=\n' >> "$GITHUB_OUTPUT"
          printf 'minor=\n' >> "$GITHUB_OUTPUT"
          printf 'major=\n' >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push ${{ matrix.service }}
    needs: prepare-version
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: cove-api
            target: api
          - service: worker
            image: cove-worker
            target: worker
          - service: gateway
            image: cove-gateway
            target: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Validate Alibaba Cloud Registry configuration
        run: |
          test -n "$ALIYUN_REGISTRY"
          test -n "$ALIYUN_NAMESPACE"

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.image }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=${{ needs.prepare-version.outputs.version }},enable=${{ needs.prepare-version.outputs.has_release == 'true' }}
            type=raw,value=${{ needs.prepare-version.outputs.minor }},enable=${{ needs.prepare-version.outputs.has_release == 'true' }}
            type=raw,value=${{ needs.prepare-version.outputs.major }},enable=${{ needs.prepare-version.outputs.has_release == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare-version.outputs.has_release == 'true' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-version.outputs.version || github.sha }}

      # Buildx 以同一构建产物为两个 registry 打 tag；任一推送失败会阻止后续部署。
      - name: Build and push image to Alibaba Cloud and GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./packages/server
          push: true
          build-args: CMD_TARGET=${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    needs: [prepare-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      # --generate-notes 需要本地 git 历史；本 job 原先未 checkout 会导致 gh 报 not a git repository。
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # tag 已由推送触发 CD，这里只补建 GitHub Release（若尚未创建）。
      - name: Ensure GitHub Release for tag
        if: needs.prepare-version.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
            exit 0
          fi
          gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --generate-notes --title "$RELEASE_TAG"

      - name: Skip GitHub Release
        if: needs.prepare-version.outputs.has_release != 'true'
        run: echo 'No version tag on this run; skip GitHub Release.'

  deploy:
    name: Deploy API and Worker
    needs: publish-release
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: cove-production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_COMPOSE_DIR: ${{ secrets.DEPLOY_COMPOSE_DIR || '/opt/cove' }}
      DEPLOY_ALIYUN_USERNAME: ${{ secrets.DEPLOY_ALIYUN_USERNAME }}
      DEPLOY_ALIYUN_PASSWORD: ${{ secrets.DEPLOY_ALIYUN_PASSWORD }}
    steps:
      - name: Diagnose SSH host key fingerprint
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          set -euo pipefail
          keys=$(ssh-keyscan -T 10 -p "$DEPLOY_PORT" -t ed25519,ecdsa,rsa "$DEPLOY_HOST" 2>/dev/null)
          test -n "$keys"
          printf '%s\n' "$keys" | ssh-keygen -lf - -E sha256

      - name: Deploy the immutable Alibaba Cloud release through SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          ALIYUN_REGISTRY: ${{ env.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ env.ALIYUN_NAMESPACE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_COMPOSE_DIR: ${{ env.DEPLOY_COMPOSE_DIR }}
          DEPLOY_ALIYUN_USERNAME: ${{ env.DEPLOY_ALIYUN_USERNAME }}
          DEPLOY_ALIYUN_PASSWORD: ${{ env.DEPLOY_ALIYUN_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_SSH_FINGERPRINT }}
          command_timeout: 20m
          envs: ALIYUN_REGISTRY,ALIYUN_NAMESPACE,IMAGE_TAG,DEPLOY_COMPOSE_DIR,DEPLOY_ALIYUN_USERNAME,DEPLOY_ALIYUN_PASSWORD
          script: |
            set -eu

            fail() {
              echo "ERROR: $*" >&2
              exit 1
            }

            for value in ALIYUN_REGISTRY ALIYUN_NAMESPACE IMAGE_TAG DEPLOY_COMPOSE_DIR DEPLOY_ALIYUN_USERNAME DEPLOY_ALIYUN_PASSWORD; do
              eval "current=\${$value:-}"
              test -n "$current" || fail "$value is required"
            done

            command -v docker >/dev/null || fail "docker is not installed"
            docker compose version >/dev/null || fail "docker compose is not available"
            docker network inspect boxify_default >/dev/null || fail "required Docker network is missing: boxify_default"
            test -d "$DEPLOY_COMPOSE_DIR" || fail "deployment directory does not exist: $DEPLOY_COMPOSE_DIR"
            cd "$DEPLOY_COMPOSE_DIR"

            compose_file="packages/server/deployments/docker-compose.production.yml"
            config_file="packages/server/configs/config.production.yml"
            test -f "$compose_file" || fail "production compose file is missing: $compose_file"
            test -f "$config_file" || fail "production config is missing: $config_file"

            compose() {
              docker compose -f "$compose_file" "$@"
            }

            state_dir=".deploy"
            state_file="$state_dir/image-tag"
            previous_tag=""
            if test -f "$state_file"; then
              previous_tag=$(tr -d '\r\n' < "$state_file")
            fi

            running_tag() {
              service="$1"
              container_id=$(compose ps -q "$service")
              test -n "$container_id" || return 1
              image=$(docker inspect --format '{{.Config.Image}}' "$container_id")
              prefix="$ALIYUN_REGISTRY/$ALIYUN_NAMESPACE/cove-$service:"
              case "$image" in
                "$prefix"*) printf '%s\n' "${image#"$prefix"}" ;;
                *) return 1 ;;
              esac
            }

            # 首次切换时把已运行的同一 SHA 记录为回滚版本，拒绝覆盖未知或版本漂移的容器。
            if test -z "$previous_tag"; then
              api_tag=$(running_tag api || true)
              worker_tag=$(running_tag worker || true)
              if test -n "$api_tag" || test -n "$worker_tag"; then
                test -n "$api_tag" && test -n "$worker_tag" || fail "both api and worker must be running before state bootstrap"
                test "$api_tag" = "$worker_tag" || fail "api and worker are not running the same image tag"
                printf '%s' "$api_tag" | grep -Eq '^[0-9a-f]{40}$' || fail "running image tag is not an immutable SHA"
                previous_tag="$api_tag"
                mkdir -p "$state_dir"
                printf '%s\n' "$previous_tag" > "$state_file.tmp"
                mv "$state_file.tmp" "$state_file"
                echo "Bootstrapped rollback state from running image: $previous_tag"
              fi
            fi

            rollback() {
              if test -z "$previous_tag"; then
                echo "No previous release is recorded; skipping rollback." >&2
                return
              fi
              echo "Rolling back API and worker to $previous_tag" >&2
              IMAGE_TAG="$previous_tag" compose config >/dev/null \
                && IMAGE_TAG="$previous_tag" compose up -d --no-build --no-deps --force-recreate worker api \
                || true
            }

            diagnose() {
              service="$1"
              container_id=$(compose ps -q "$service" || true)
              echo "--- $service container state ---" >&2
              if test -n "$container_id"; then
                docker inspect --format '{{json .State}}' "$container_id" >&2 || true
              fi
              echo "--- $service recent logs ---" >&2
              compose logs --tail 200 "$service" >&2 || true
            }

            wait_for_healthy() {
              service="$1"
              for attempt in $(seq 1 60); do
                container_id=$(compose ps -q "$service" || true)
                if test -n "$container_id"; then
                  health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || true)
                  if test "$health" = "healthy"; then
                    return 0
                  fi
                  echo "Waiting for $service health ($attempt/60): ${health:-missing}" >&2
                else
                  echo "Waiting for $service container ($attempt/60)" >&2
                fi
                sleep 5
              done
              diagnose "$service"
              return 1
            }

            # 先验证变量替换后的配置，再从阿里云拉取指定 SHA 镜像，避免 compose 回退到本地构建。
            export ALIYUN_REGISTRY ALIYUN_NAMESPACE IMAGE_TAG
            compose config >/dev/null || fail "invalid production compose configuration"
            printf '%s' "$DEPLOY_ALIYUN_PASSWORD" | docker login "$ALIYUN_REGISTRY" --username "$DEPLOY_ALIYUN_USERNAME" --password-stdin
            trap 'docker logout "$ALIYUN_REGISTRY" >/dev/null 2>&1 || true' EXIT

            if ! compose pull api worker; then
              rollback
              fail "failed to pull candidate images from Alibaba Cloud"
            fi

            # worker 先替换并通过健康检查，避免 API 已切换但后台任务进程不可用。
            if ! compose up -d --no-build --no-deps --force-recreate worker || ! wait_for_healthy worker; then
              rollback
              fail "worker candidate did not become healthy"
            fi
            if ! compose up -d --no-build --no-deps --force-recreate api || ! wait_for_healthy api; then
              rollback
              fail "api candidate did not become healthy"
            fi

            mkdir -p "$state_dir"
            printf '%s\n' "$IMAGE_TAG" > "$state_file.tmp"
            mv "$state_file.tmp" "$state_file"
            docker image prune -f
            compose ps api worker
            echo "Deployment completed from Alibaba Cloud: $IMAGE_TAG"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cove
      POSTGRES_PASSWORD: cove
      POSTGRES_DB: cove
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/coveneo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  es_data:
  neo4j_data:
  redis_data:

